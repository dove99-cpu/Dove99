<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #fce4ec, #e3f2fd);
      font-family: sans-serif;
    }
    h1 {
      color: #555;
      font-size: 2.5rem;
      margin-bottom: 24px;
    }
    .pigeon-wrap {
      position: relative;
      display: inline-block;
    }
    img {
      width: 280px;
      border-radius: 50%;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      filter: brightness(1.1) saturate(0.7) contrast(0.9) hue-rotate(10deg);
      border: 6px solid white;
    }
    .label {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <div class="pigeon-wrap">
    <img src="비둘기.jpg" alt="비둘기">
  </div>
  <p class="label">🕊 비둘기</p>
</body>
</html>
