<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
      font-family: sans-serif;
    }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
    <!-- 몸통 -->
    <ellipse cx="100" cy="120" rx="50" ry="35" fill="#b0b0b0"/>
    <!-- 머리 -->
    <circle cx="145" cy="95" r="22" fill="#c8c8c8"/>
    <!-- 부리 -->
    <polygon points="167,93 180,97 167,101" fill="#e0a030"/>
    <!-- 눈 -->
    <circle cx="153" cy="91" r="4" fill="#222"/>
    <circle cx="154" cy="90" r="1.5" fill="white"/>
    <!-- 날개 -->
    <ellipse cx="85" cy="115" rx="40" ry="18" fill="#888" transform="rotate(-15 85 115)"/>
    <!-- 꼬리 -->
    <polygon points="52,125 35,110 35,140" fill="#777"/>
    <!-- 다리 -->
    <line x1="105" y1="153" x2="100" y2="172" stroke="#e0a030" stroke-width="3"/>
    <line x1="115" y1="153" x2="120" y2="172" stroke="#e0a030" stroke-width="3"/>
    <!-- 발 -->
    <line x1="100" y1="172" x2="90" y2="178" stroke="#e0a030" stroke-width="2"/>
    <line x1="100" y1="172" x2="100" y2="180" stroke="#e0a030" stroke-width="2"/>
    <line x1="100" y1="172" x2="110" y2="178" stroke="#e0a030" stroke-width="2"/>
    <line x1="120" y1="172" x2="110" y2="178" stroke="#e0a030" stroke-width="2"/>
    <line x1="120" y1="172" x2="120" y2="180" stroke="#e0a030" stroke-width="2"/>
    <line x1="120" y1="172" x2="130" y2="178" stroke="#e0a030" stroke-width="2"/>
    <!-- 목 무늬 -->
    <ellipse cx="135" cy="110" rx="10" ry="7" fill="#9370DB" opacity="0.4"/>
  </svg>
</body>
</html>
